name: eleicao_pesquisa
description: "Aplicativo de pesquisa/urna eletrônica"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  
  # Gerenciamento de Estado
  provider: ^6.1.1

  # Comunicação e APIs
  http: ^1.2.0

  # Persistência e Banco de Dados (Hive)
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.0.15
  shared_preferences: ^2.1.1

  # Arquivos e Notificações
  file_picker: ^8.0.0
  flutter_local_notifications: ^20.1.0
  permission_handler: ^11.0.0
  timezone: ^0.10.1
  intl: ^0.18.1

  # Gráficos e PDF
  fl_chart: ^0.60.0
  pdf: ^3.8.1
  printing: ^5.10.0

  # Design
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.6
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true